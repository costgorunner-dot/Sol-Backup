<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoBoard Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <h1>🎬 Orb Night Documentary</h1>
            <p class="subtitle">Project overview at a glance</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-content">
                    <div class="stat-number" id="total-scenes">24</div>
                    <div class="stat-label">Total Scenes</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-content">
                    <div class="stat-number" id="completed-scenes">3</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">🎬</div>
                <div class="stat-content">
                    <div class="stat-number" id="in-progress-scenes">7</div>
                    <div class="stat-label">In Progress</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-content">
                    <div class="stat-number" id="draft-scenes">14</div>
                    <div class="stat-label">Drafts</div>
                </div>
            </div>
        </div>
        
        <div class="progress-section">
            <h2>📈 Progress</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 12.5%"></div>
            </div>
            <p class="progress-text"><span id="progress-percent">12.5</span>% complete</p>
        </div>
        
        <div class="quick-actions">
            <h2>⚡ Quick Actions</h2>
            <button class="action-btn" onclick="generatePrompt()">📝 Generate Prompt</button>
            <button class="action-btn" onclick="exportScene()">📦 Export Scene</button>
            <button class="action-btn" onclick="markComplete()">✅ Mark Complete</button>
        </div>
        
        <div class="recent-activity">
            <h2>🕐 Recent Activity</h2>
            <div class="activity-list" id="activity-list">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
